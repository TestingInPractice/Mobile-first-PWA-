name: codeai-build-loop
version: 1.0.0
description: CodeAI Build Loop — Multi-Agent Workflow Framework
created: 2026-06-11

files:
  schemas/state.schema.json:
    purpose: JSON Schema for state.json validation
    editable: false
  schemas/phase.schema.json:
    purpose: JSON Schema for phases.json validation
    editable: false

  states/initial.json:
    purpose: Default initial state
    editable: true
  states/phase-template.json:
    purpose: Phase definition template
    editable: true

  judge-rubrics/analyst.json:
    purpose: Rubric for analyst judge
    editable: true
  judge-rubrics/developer.json:
    purpose: Rubric for developer judge
    editable: true
  judge-rubrics/tester.json:
    purpose: Rubric for tester judge
    editable: true

  config.yaml:
    purpose: Project-specific transition rules
    editable: true
    generated: true

  skills/workflow-core/SKILL.md:
    purpose: Master orchestrator skill
    editable: true
  skills/workflow-core/references/subagent-protocol.md:
    purpose: Subagent status protocol
    editable: true
  skills/workflow-core/references/judge-rubric.md:
    purpose: Judge scoring protocol
    editable: true

  templates/specs/requirements.md:
    purpose: Spec template (ТЗ) — единый формат входного файла
    editable: true
    deploy_to: docs/specs/requirements.md

  scripts/validate_state.py:
    purpose: State validation (schema + invariants + gates)
    editable: false
  scripts/transition.py:
    purpose: Atomic state transition with locking
    editable: false
  scripts/init_workflow.py:
    purpose: Template deployment tool
    editable: false
  scripts/evaluate_judge.py:
    purpose: Hybrid structural + AI judge with IEEE 29148
    editable: false

  AGENTS.md:
    purpose: Bootstrap instruction — explains agent what to do with this repo
    editable: true

  templates/tasks/task.md:
    purpose: Task document template (UUID, AC, spec_ref)
    editable: true
    deploy_to: .workflow/templates/task.md

  skills/plan-release/SKILL.md:
    purpose: Analyst subagent instructions for spec → tasks → issues
    editable: true
  skills/implement-spec-stage/SKILL.md:
    purpose: Developer subagent instructions — implementation + unit tests
    editable: true
  skills/write-tests/SKILL.md:
    purpose: Tester subagent instructions — integration/e2e/regression tests
    editable: true
  skills/integrate-release/SKILL.md:
    purpose: Release integration — merge, changelog, tag, close issues
    editable: true
  skills/deploy-release/SKILL.md:
    purpose: Local verification — health check, smoke tests, report
    editable: true
